##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
#windowrule = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
#windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

#windowrule = fullscreen, class:^(google-chrome)$,

# workspace = 20002, defaultFloat:true
# windowrulev = float, workspace:20002
# windowrulev = center, workspace:20002, floating:1

# windowrule = float, class:^(QQ)$

windowrule = match:workspace name:qq, float on
windowrule = match:workspace name:qq, maximize off
windowrule = match:workspace name:qq, fullscreen off

# windowrule = match:class QQ, float on
windowrule = match:class QQ, workspace name:qq
