### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
#windowrule = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
#windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

#windowrule = fullscreen, class:^(google-chrome)$,

# workspace = 20002, defaultFloat:true
# windowrulev = float, workspace:20002
# windowrulev = center, workspace:20002, floating:1

# windowrule = float, class:^(QQ)$

# windowrule = match:workspace name:qq, float on
# windowrule = match:workspace name:qq, maximize off
# windowrule = match:workspace name:qq, fullscreen off

windowrule = match:class QQ, workspace name:qq
windowrule = match:class wechat, workspace name:qq
windowrule = match:class QQ, match:title 设置, float on
windowrule = match:class QQ, match:title 群聊的聊天记录, float on
windowrule = match:class QQ, match:title 图片查看器, float on
windowrule = match:class QQ, match:title 视频播放器, float on
windowrule = match:class wechat, match:title 图片和视频, float on
windowrule = match:class wechat, match:title Photos and Videos, float on

windowrule = match:class ruin, float on
windowrule = match:class ruin, maximize off
windowrule = match:class ruin, workspace name:ruin

windowrule = match:class vlc, float on
windowrule = match:class mpv, float on
windowrule = match:class org.gnome.FileRoller, float on
windowrule = match:class org.gnome.Nautilus, float on
windowrule = match:class nm-connection-editor, float on
windowrule = match:class org.gnome.Loupe, float on

windowrule = match:title DevTools, match:class google-chrome, workspace name:log
